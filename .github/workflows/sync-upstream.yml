name: Sync upstream

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  sync:
    name: Merge upstream into main
    runs-on: ubuntu-latest

    steps:
      - name: Check out fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "shengmingboai@gmail.com"

      - name: Add upstream
        run: |
          git remote add upstream https://github.com/QuantumNous/new-api.git
          git fetch upstream main

      - name: Merge upstream
        id: merge
        run: |
          before_sha="$(git rev-parse HEAD)"
          git merge --no-edit upstream/main
          after_sha="$(git rev-parse HEAD)"
          if [ "${before_sha}" != "${after_sha}" ]; then
            echo "changed=true" >> "${GITHUB_OUTPUT}"
          else
            echo "changed=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Push changes
        if: steps.merge.outputs.changed == 'true'
        run: |
          git push origin main

      - name: Trigger GHCR image workflow
        if: steps.merge.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          curl -fsSL -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/workflows/ghcr.yml/dispatches" \
            -d '{"ref":"main"}'
